[project]
name = "sse"
description = "Stacks Stablecoin Engine (SSE) minimal prototype scaffold"
authors = []
telemetry = true
cache_dir = "./.cache"
clarity_version = 3
epoch = "3.1"

# Canonical SIP-010 fungible-token trait. We reference the mainnet-deployed
# trait by full principal across all consumer contracts. Clarinet downloads
# the source for simnet tests via this requirement.
[[project.requirements]]
contract_id = "SP3FBR2AGK5H9QBDH3EEN6DF8EK8JY7RX8QJ5SVTE.sip-010-trait-ft-standard"

[contracts.stablecoin-engine-token-trait]
path = "contracts/stablecoin-engine-token-trait.clar"
epoch = "3.1"

[contracts.oracle-trait]
path = "contracts/oracle-trait.clar"
epoch = "3.1"

[contracts.bridge-adapter-trait]
path = "contracts/bridge-adapter-trait.clar"
epoch = "3.1"

# ── Governance ────────────────────────────────────────────────────────────────

[contracts.sse-governance-v1]
path = "contracts/sse-governance-v1.clar"
epoch = "3.1"

[contracts.sse-timelock-v1]
path = "contracts/sse-timelock-v1.clar"
epoch = "3.1"
depends_on = ["sse-governance-v1", "stablecoin-factory-v4", "collateral-registry-v6", "bridge-registry-v4", "xreserve-adapter-v5", "multi-asset-vault-engine-v7"]

# ── Governed (vN+1) ───────────────────────────────────────────────────────────

[contracts.bridge-registry-v4]
path = "contracts/bridge-registry-v4.clar"
epoch = "3.1"

[contracts.stablecoin-factory-v4]
path = "contracts/stablecoin-factory-v4.clar"
epoch = "3.1"

# For simnet testing, use the mock adapter that allows set-value
# For testnet/mainnet deployment, deploy contracts/dia-oracle-adapter.clar instead
[contracts.dia-oracle-adapter]
path = "contracts/dia-oracle-adapter-simnet.clar"
epoch = "3.1"

[contracts.price-oracle-dia-btc-v2]
path = "contracts/price-oracle-dia-btc-v2.clar"
epoch = "3.1"
depends_on = ["oracle-trait", "dia-oracle-adapter"]

[contracts.price-oracle-dia-stx-v2]
path = "contracts/price-oracle-dia-stx-v2.clar"
epoch = "3.1"
depends_on = ["oracle-trait", "dia-oracle-adapter"]

# Constant $1 oracle for VoltFi vGold (vGLD). Implements oracle-trait,
# returns u100000000 (= $1.00 at 8-decimal PRICE-SCALE) unconditionally.
[contracts.price-oracle-vgld-v1]
path = "contracts/price-oracle-vgld-v1.clar"
epoch = "3.1"
depends_on = ["oracle-trait"]

# Constant $1 oracle for EGP Bond A (EGPB). Implements oracle-trait,
# returns u100000000 (= $1.00 at 8-decimal PRICE-SCALE) unconditionally.
[contracts.price-oracle-egpb-v1]
path = "contracts/price-oracle-egpb-v1.clar"
epoch = "3.1"
depends_on = ["oracle-trait"]

[contracts.sbtc-token-v4]
path = "contracts/sbtc-token-v4.clar"
epoch = "3.1"
depends_on = ["sip-010-trait"]

[contracts.stx-token-v4]
path = "contracts/stx-token-v4.clar"
epoch = "3.1"
depends_on = ["sip-010-trait"]

# Testnet/simnet stand-in for VoltFi vGLD (real vGLD principal is wired via
# sse.config.json on mainnet).
[contracts.vgld-token-v4]
path = "contracts/vgld-token-v4.clar"
epoch = "3.1"
depends_on = ["sip-010-trait"]

# EGP Bond A (EGPB) -- SSE-issued bond token, owner-gated mint/burn.
# Ships to mainnet as-is (unlike vgld-token-v4, which is a testnet stub).
[contracts.egpb-token-v1]
path = "contracts/egpb-token-v1.clar"
epoch = "3.1"
depends_on = ["sip-010-trait"]

[contracts.stablecoin-token-v4]
path = "contracts/stablecoin-token-v4.clar"
epoch = "3.1"
depends_on = ["sip-010-trait", "stablecoin-engine-token-trait"]

[contracts.collateral-registry-v6]
path = "contracts/collateral-registry-v6.clar"
epoch = "3.1"
depends_on = ["stablecoin-factory-v4"]

[contracts.stability-pool-v6]
path = "contracts/stability-pool-v6.clar"
epoch = "3.1"
depends_on = ["sip-010-trait", "stablecoin-factory-v4", "stablecoin-token-v4", "liquidation-engine-v7"]

[contracts.multi-asset-vault-engine-v7]
path = "contracts/multi-asset-vault-engine-v7.clar"
epoch = "3.1"
depends_on = ["sip-010-trait", "stablecoin-token-v4", "price-oracle-dia-btc-v2", "price-oracle-dia-stx-v2", "collateral-registry-v6", "stablecoin-factory-v4", "stablecoin-engine-token-trait", "sbtc-token-v4", "stx-token-v4", "stability-pool-v6", "liquidation-engine-v7"]

[contracts.liquidation-engine-v7]
path = "contracts/liquidation-engine-v7.clar"
epoch = "3.1"
depends_on = ["sip-010-trait", "stablecoin-engine-token-trait", "multi-asset-vault-engine-v7", "stability-pool-v6"]

# ── v8 engine + liquidation (trait-based oracle dispatch) ─────────────────────
# v8 reads the oracle principal from collateral-registry-v6 (which already
# stored it but v7 ignored) and accepts the oracle as a trait reference at
# every pricing call site. After v8 ships, adding any new collateral with a
# new price source requires zero engine changes -- only a tiny oracle wrapper
# (or none if reusing existing) plus a timelock-governed add-collateral-type
# call. See docs/plans/add-vgld-collateral.md for full rationale.

[contracts.stability-pool-v7]
path = "contracts/stability-pool-v7.clar"
epoch = "3.1"
depends_on = ["sip-010-trait", "stablecoin-factory-v4", "stablecoin-token-v4", "liquidation-engine-v8"]

[contracts.multi-asset-vault-engine-v8]
path = "contracts/multi-asset-vault-engine-v8.clar"
epoch = "3.1"
depends_on = ["sip-010-trait", "oracle-trait", "stablecoin-token-v4", "collateral-registry-v6", "stablecoin-factory-v4", "stablecoin-engine-token-trait", "stability-pool-v7", "liquidation-engine-v8"]

[contracts.liquidation-engine-v8]
path = "contracts/liquidation-engine-v8.clar"
epoch = "3.1"
depends_on = ["sip-010-trait", "oracle-trait", "stablecoin-engine-token-trait", "multi-asset-vault-engine-v8", "stability-pool-v7"]

[contracts.xreserve-adapter-v5]
path = "contracts/xreserve-adapter-v5.clar"
epoch = "3.1"
depends_on = ["bridge-adapter-trait", "stablecoin-token-v4", "bridge-registry-v4"]

[repl.analysis]
passes = ["check_checker"]
check_checker = { trusted_sender = false, trusted_caller = false, callee_filter = false }

# Check-checker settings:
# trusted_sender: if true, inputs are trusted after tx_sender has been checked.
# trusted_caller: if true, inputs are trusted after contract-caller has been checked.
# callee_filter: if true, untrusted data may be passed into a private function without a
# warning, if it gets checked inside. This check will also propagate up to the
# caller.
# More informations: https://www.hiro.so/blog/new-safety-checks-in-clarinet
