name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint Clarity contracts
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            hirosystems/clarinet:latest \
            clarinet check -d

      - name: Run test suite
        run: npm test
